<!DOCTYPE html>
<html>
<head>
    <title>SAT Math Question 1</title>
</head>
<body>
    <div class="question-container" data-question-id="sat_math_001">
        <div class="subject-title">SAT Math</div>

        <div class="question-text">
            If 2x + 3 = 7, what is the value of x?
        </div>

        <div class="options">
            <div class="option">A. 1</div>
            <div class="option">B. 2</div>
            <div class="option">C. 3</div>
            <div class="option">D. 4</div>
        </div>

        <div class="correct-answer">B</div>

        <div class="explanation">
            To solve the equation 2x + 3 = 7, subtract 3 from both sides: 2x = 4. Then divide both sides by 2: x = 2.
        </div>

        <div class="tags">
            <span class="tag">Algebra</span>
            <span class="tag">Linear Equations</span>
            <span class="tag">Solving Equations</span>
        </div>
    </div>
</body>
